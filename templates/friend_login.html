{% extends "base.html" %}

{% block content %}
<div class="card login-card">
  <h2>Friend login</h2>
  <p>Enter your name and code.</p>
  <form method="post" action="{{ url_for('friend_login') }}">
    <label for="name">Your name</label>
    <input id="name" name="name" type="text" placeholder="Enter your name" required>

    <label for="code">Access code</label>
    <input id="code" name="code" type="text" placeholder="Enter access code" required>

    <button type="submit">Sign in</button>
  </form>
</div>
{% endblock %}
