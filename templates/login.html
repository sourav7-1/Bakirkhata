{% extends "base.html" %}

{% block content %}
<div class="card login-card">
  <h2>Sign in to ZEN</h2>
  <p>Enter your username and password to access your private portal. Only your account can see your friends and transaction details.</p>
  <form method="post" action="{{ url_for('login') }}">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" placeholder="Your username" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" placeholder="Enter password" required>

    <button type="submit">Sign in</button>
  </form>
  <p class="small-note">Don't have an account yet? <a href="{{ url_for('signup') }}">Sign up here</a>.</p>
</div>
{% endblock %}
